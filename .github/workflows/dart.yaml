name: iOS-ipa-build

on:
  workflow_dispatch:

jobs:
  build-ios:
    name: 🎉 iOS Build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v3

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.2'
          channel: 'stable'

      - name: Cache pub dependencies
        uses: actions/cache@v3
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}

      - name: Cache CocoaPods
        uses: actions/cache@v3
        with:
          path: ios/Pods
          key: ${{ runner.os }}-pods-${{ hashFiles('**/Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-pods-

      - run: flutter pub get

      - name: Set iOS deployment target
        run: |
          sed -i '' "s/platform :ios, '[0-9.]*'/platform :ios, '16.0'/" ios/Podfile
          # Add platform line if it doesn't exist
          grep -q "platform :ios" ios/Podfile || sed -i '' "1s/^/platform :ios, '16.0'\n/" ios/Podfile
          # Update post_install deployment target
          sed -i '' "s/IPHONEOS_DEPLOYMENT_TARGET.*=.*'[0-9.]*'/IPHONEOS_DEPLOYMENT_TARGET'] = '16.0'/" ios/Podfile

      - run: flutter build ios --release --no-codesign

      - name: Package as IPA
        working-directory: build/ios/iphoneos
        run: |
          mkdir Payload
          mv Runner.app Payload/
          zip -qq -r -9 FlutterIpaExport.ipa Payload

      - name: Upload to release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: build/ios/iphoneos/FlutterIpaExport.ipa
          tag: ${{ github.ref_name }}
          overwrite: true
          body: "iOS build from ${{ github.sha }}"
